<h1>SAMTLIGA KARAKTÄRER</h1>
<P>Här följer en lista på alla karaktärer som aktuellt finns att spela med. Varje karaktär är länkad till de officiella orginalkaraktärerna där man kan hitta mer info och strategitips.</p> 

<div id="role-list"></div>


</div>

<script>
const TEAM_NAMES = {
  townsfolk: 'STADSBOR',
  outsider:  'LANTBOR',
  minion:    'KUMPANER',
  demon:     'HÖGFÖRRÄDARE',
  traveler:  'RESENÄRER'
};

function changeTeamName(team) {
  return TEAM_NAMES[team] ?? '';
}

fetch("roles.json")
  .then(response => response.json())
  .then(data => {
    
    const container = document.getElementById("role-list");
    let currentTeam = null;

    const TEAM_ORDER = ["townsfolk", "outsider", "minion", "demon", "traveler"];

    data
      .sort((a, b) => {
        const teamDiff = TEAM_ORDER.indexOf(a.team) - TEAM_ORDER.indexOf(b.team);
        if (teamDiff !== 0) return teamDiff;
        return a.name.localeCompare(b.name, "sv");
      })
      .forEach(role => {

        // Ny teamrubrik när team ändras
        if (role.team !== currentTeam) {
          currentTeam = role.team;

          const header = document.createElement("h2");
          header.textContent = changeTeamName(currentTeam);
          header.classList.add("team-" + currentTeam);
          header.style.marginTop = "35px";
          header.style.marginBottom = "10px";
          container.appendChild(header);
        }

        // Skapa wrapper
        const item = document.createElement("div");
        item.classList.add("role-item");

        // Namnlänk (fixar versal första bokstaven)
        const wikiId = role.id.charAt(0).toUpperCase() + role.id.slice(1);

        const nameLink = document.createElement("a");
        nameLink.href = "https://wiki.bloodontheclocktower.com/" + wikiId;
        nameLink.target = "_blank";
        nameLink.classList.add("team-" + role.team);
        nameLink.textContent = role.name;

        // Ability
        const ability = document.createElement("p");
        ability.textContent = role.ability;

        // Lägg in i DOM
        item.appendChild(nameLink);
        item.appendChild(ability);
        container.appendChild(item);
      });

  })
  .catch(err => console.error("Kunde inte läsa JSON:", err));

</script>
