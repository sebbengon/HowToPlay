<h1>KOMMANDE EVENT</H1>
<P>Nästa omgång är söndagen den 10 maj som planen ser ut nu. Är det första gången du spelar så läs gärna igenom reglerna. Vi kommer spela med följande manus.</p>




<h2 id="manus-title">MANUS</h2>
    
<div id="rolls"></div>
<p>*Ej första natten</p>

<script>
let ALL_CHARACTERS = [];

async function loadCharacters() {
  const res = await fetch("roles.json");
  ALL_CHARACTERS = await res.json();
}

async function loadScript() {
  try {
    const res = await fetch("manus.json");
    const script = await res.json();
    renderScript(script);
  } catch (err) {
    console.error("Kunde inte ladda manus.json", err);
    document.getElementById("scriptTitle").textContent =
      "Fel: kunde inte ladda manus.json";
  }
}

const TEAM_NAMES = {
  townsfolk: 'STADSBOR',
  outsider:  'LANTBOR',
  minion:    'KUMPANER',
  demon:     'HÖGFÖRRÄDARE',
  traveler:  'RESENÄRER'
};

function changeTeamName(team) {
  return TEAM_NAMES[team] ?? '';
}

window.addEventListener("DOMContentLoaded", async () => {
  await loadCharacters();
  await loadScript(); // 🔑 här sker autoladdning
});

function renderScript(script) {
  const container = document.getElementById("rolls");
  container.innerHTML = "";

  const meta = script.find(x => typeof x === "object" && x.id === "_meta");
  document.getElementById("manus-title").textContent =
  meta?.name ?? "MANUS";

  const ids = script.filter(x => typeof x === "string");

  const lookup = Object.fromEntries(
    ALL_CHARACTERS.map(c => [c.id, c])
  );

  const used = ids.map(id => lookup[id]).filter(Boolean);

  const teams = {};
  for (const c of used) {
    teams[c.team] ??= [];
    teams[c.team].push(c);
  }

  for (const [team, chars] of Object.entries(teams)) {
    const section = document.createElement("section");

    const h2 = document.createElement("h2");
    h2.textContent = changeTeamName(team);
    h2.classList.add(`team-${team}`);
    section.appendChild(h2);

    const grid = document.createElement("div");
    grid.className = "grid";

    for (const c of chars) {
      const el = document.createElement("div");
      el.className = "character";

      el.innerHTML = `                
<img
  src="https://raw.githubusercontent.com/sebbengon/CotC/master/src/assets/icons/${c.id}.png"
  alt="${c.name}"
  class="character-icon"
/>

<div class="character-name name-${c.team}">
  ${c.name}
  <div class="character-ability">
    ${c.ability}
  </div>
</div>
      `;

      grid.appendChild(el);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }
}
</script>
