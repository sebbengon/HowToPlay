<h1>KOMMANDE EVENT</H1>
<P>Nästa omgång är den 10 maj som planen ser ut nu. Då spelar vi med följande manus. Första gången du är med? Läs då gärna igenom reglerna.</p>

<div id="manus-display">
    <h3 id="manus-title">KARAKTÄRER</h3>
    

    <img id="manus-image" 
         src="manus.png" 
         alt="Bild 1"
         style="width:100%; object-fit:contain; cursor:default;">
</div>

</div>
<script>
document.addEventListener("DOMContentLoaded", () => {

    // Dina 3 slides
    const slides = [
        {
            title: "KARAKTÄRER",
            text: "Karaktärerna för aktuellt manus.",
            img: "manus.png"
        },
        {
            title: "NATTORDNING FÖRSTA NATTEN",
            text: "Nattordningen för de karaktärer som vaknar första natten.",
            img: "nattfas-1.png"
        },
        {
            title: "NATTORDNING ÖVRIGA NÄTTER",
            text: "Nattordningen för de karaktärer som vaknar övriga nätter.",
            img: "nattfas-2.png"
        }
    ];

    let index = 0;  // start på slide 1

    const titleEl = document.getElementById("manus-title");
    
    const imgEl  = document.getElementById("manus-image");

    // Klick på bilden växlar slide
    imgEl.addEventListener("click", () => {
        index = (index + 1) % slides.length; // loop 0 → 1 → 2 → 0

        titleEl.innerHTML = slides[index].title;
 
        imgEl.src         = slides[index].img;
        imgEl.alt         = "Bild " + (index + 1);
    });

});
</script>
