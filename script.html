<!DOCTYPE html>
<html lang="sv">
<head>
<title>CotC – Karaktärslista</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https:://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
<meta charset="UTF-8">

<style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">


.controls {
  display: flex;
  gap: 10px;
  margin: 10px 0 20px 0;
  flex-wrap: wrap;
}

.ui-button {
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #444;
  background: #f5f5f5;
  border-radius: 4px;
}

.ui-button:hover {
  background: #eaeaea;
}
body {
  font-family: system-ui, sans-serif;
  margin: 20px;
}

h1 { margin-bottom: 10px; 
     font-family: 'IM Fell English', serif;}

h2 {
  margin-top: 32px;
  border-bottom: 2px solid #888;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 28px;
}

.character {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  break-inside: avoid;
}

.character-icon {
  width: 40px;
  height: 40px;
  object-fit: contain;
  flex-shrink: 0;
}

.character-name {
  font-weight: bold;
}

.character-ability {
  font-size: 10pt;
  font-weight: 300;
  color: #000;
}

.print-footer {
  display: none;
}
.night-order .grid {
  display: grid;
  grid-template-columns: 1fr;
}

/* ===== TEAM-FÄRGER ===== */

/* Rubriker */
.team-townsfolk { color: #1e4fd8; }   /* Blå */
.team-outsider  { color: #3aa0e6; }   /* Ljusblå */
.team-minion    { color: #e67e22; }   /* Orange */
.team-demon     { color: #c0392b; }   /* Röd */
.team-traveler  { color: #7b3fb8; }   /* Lila */

/* Karaktärsnamn */
.name-townsfolk { color: #1e4fd8; }
.name-outsider  { color: #3aa0e6; }
.name-minion    { color: #e67e22; }
.name-demon     { color: #c0392b; }
.team-traveler  { color: #7b3fb8; }   


/* Dölj knappen vid utskrift */
@media print {
  .controls {
    display: none;
  }
}

@page {
  size: A4;
  margin-top: 8mm;
  margin-bottom: 8mm;
  margin-left: 15mm;
  margin-right: 15mm;
}

@media print {

  .night-order {
    page-break-before: always;
    break-before: page;
  }

  body {
    margin: 0;
    font-size: 10pt;              /* 🔑 tajt men läsbar */
    line-height: 1.15;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  h1 {
    font-size: 16pt;
    margin-bottom: 4mm;
  }

  h2 {
    font-size: 10.5pt;
    margin: 3mm 0 1.5mm 0;
    page-break-after: avoid;
  }

  .grid {
    grid-template-columns: 1fr 1fr; /* ✅ exakt 2 kolumner */
    gap: 3px 11px;                  /* 🔑 väldigt viktigt */
  }

  .character {
    page-break-inside: avoid;
    margin-bottom: 2px;
  }

  .character-name {
    font-size: 11pt;
    font-weight: 700;
  }

  .character-ability {
    font-size: 10pt;
    font-weight: 400;
    color: #000
  }

.print-footer {
    display: block;
    position: fixed;
    bottom: 0mm;
    left: 0;
    right: 0;
    text-align: left;
    font-size: 8pt;
    color: #000;
    font-style: italic;
  }
   .night-order .print-footer {
    display: none;
  }

.team-traveler {
    page-break-before: always;
    break-before: page; /* modern standard */
  }
 .night-order .grid {
  display: grid;
  grid-template-columns: 1fr;
}
 .night-order .character-icon {
  width: 35px;
  height: 35px;
}

  /* Dölj UI */
  input,
  .print-button {
    display: none;
  }
}
</style>
</head>

<div class="print-footer">
  *Ej första natten
</div>

<body>

<div class="controls">
  <button class="ui-button"
          onclick="document.getElementById('scriptInput').click()">
    📂 Ladda script
  </button>

  <button class="ui-button"
          onclick="loadFromClipboard()">
    📋 Klistra in script
  </button>

  <button class="ui-button"
          onclick="window.print()">
    🖨️ Skriv ut
  </button>

  <input type="file" id="scriptInput" accept=".json" hidden>
</div>
<h1 id="scriptTitle">Ladda BotC‑script</h1>
<div id="content"></div>

<script>

/* ============================================================
   ✅ INKLISTRADE KARAKTÄRER (offline-säkert)
   Klistra in HELA din characters.json här
   ============================================================ */

let ALL_CHARACTERS = [];

async function loadCharacters() {
const res = await fetch ("roles.json");
ALL_CHARACTERS = await res.json();
}

/* ============================================================
   ✅ SCRIPT-VAL
   ============================================================ */

document.getElementById("scriptInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;

  const script = JSON.parse(await file.text());
  renderScript(script);
});

const TEAM_NAMES = {
  townsfolk: 'STADSBOR',
  outsider:  'LANTBOR',
  minion:    'KUMPANER',
  demon:     'HÖGFÖRRÄDARE',
  traveler:  'RESENÄRER'
};

const ALWAYS_NIGHT1_ACTIONS = [
  {
    id: "minioninfo",
    name: "Kumpaninfo",
    team: "minion",
    firstNight: 5,
    firstNightReminder:"Om mer än en kumpan, se till så alla får ögonkontakt. Visa kortet DETTA ÄR HÖGFÖRRÄDAREN. Peka på Högförrädaren."
      
  },
  {
    id: "demoninfo",
    name: "HF info & bluffar",
    team: "demon",
    firstNight: 8,
    firstNightReminder: "Visa kortet DESSA ÄR KUMPANER. Peka på varje kumpan. Visa kortet DESSA KARAKTÄRER ÄR INTE I SPEL. Visa 3 karaktärskort på Lojala karaktärer som inte är i spel."
  },
  {
    id: "dusk",
    name: "Skymmning",
    team: "",
    firstNight: 1,
    firstNightReminder:"Inled nattfasen."
      
  },
  {
    id: "dawn",
    name: "Gryning",
    team: "",
    firstNight: 99,
    firstNightReminder: "Vänta en stund. Avsluta nattfasen."
  }
];
const ALWAYS_NIGHT_ACTIONS = [
{
    id: "dusk",
    name: "Skymmning",
    team: "",
    otherNight: 1,
    otherNightReminder:"Inled nattfasen."
      
  },
  {
    id: "dawn",
    name: "Gryning",
    team: "",
    otherNight: 99,
    otherNightReminder: "Vänta en stund. Avsluta nattfasen."
  }
];
function changeTeamName(team) {
  return TEAM_NAMES[team] ?? '';
}
window.addEventListener("DOMContentLoaded", async() => {
await loadCharacters();
});

/* ============================================================
   ✅ RENDERING
   ============================================================ */
function renderScript(script) {
  const container = document.getElementById("content");
  container.innerHTML = "";

  const meta = script.find(x => typeof x === "object" && x.id === "_meta");
  document.getElementById("scriptTitle").textContent =
    meta?.name ?? "CotC – Karaktärslista";

  const ids = script.filter(x => typeof x === "string");

  const lookup = Object.fromEntries(
    ALL_CHARACTERS.map(c => [c.id, c])
  );

  const used = ids.map(id => lookup[id]).filter(Boolean);

  const teams = {};
  for (const c of used) {
    teams[c.team] ??= [];
    teams[c.team].push(c);
  }

  for (const [team, chars] of Object.entries(teams)) {
    const section = document.createElement("section");

    const h2 = document.createElement("h2");
    h2.textContent = changeTeamName(team);
    h2.classList.add(`team-${team}`);
    section.appendChild(h2);

    const grid = document.createElement("div");
    grid.className = "grid";

    for (const c of chars) {
      const el = document.createElement("div");
      el.className = "character";

      el.innerHTML = `                
<img
    src="https://raw.githubusercontent.com/sebbengon/CotC/master/src/assets/icons/${c.id}.png"
    alt="${c.name}"
    class="character-icon"
  >

        
<div class="character-name name-${c.team}">
    ${c.name}
  
  <div class="character-ability">
    ${c.ability}
  </div>
</div>
      `;

      grid.appendChild(el);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }

    const firstNightCharacters = [
  ...used,
  ...ALWAYS_NIGHT1_ACTIONS
];
    const otherNightCharacters = [
  ...used,
  ...ALWAYS_NIGHT_ACTIONS
];

container.appendChild(
  renderNightOrder("Första natten", firstNightCharacters, "firstNight")
)

   container.appendChild(
   renderNightOrder("Övriga nätter", otherNightCharacters, "otherNight")
  );
}
async function loadFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text.trim()) {
      alert("Urklippet är tomt.");
      return;
    }

    const script = JSON.parse(text);
    renderScript(script);
  } catch (err) {
    alert("Kunde inte läsa script från urklippet.\nKontrollera att det är giltig JSON.");
  }
}
function renderNightOrder(title, characters, key) {
  const section = document.createElement("section");
  section.className = "night-order";

  const h2 = document.createElement("h2");
  h2.textContent = title;
  section.appendChild(h2);

  const grid = document.createElement("div");
  grid.className = "grid";

  const sorted = characters
    .filter(c => c[key] && c[key] > 0)
    .sort((a, b) => a[key] - b[key]);

  for (const c of sorted) {
    const el = document.createElement("div");
    el.className = "character";

    el.innerHTML = `

<img
  src="https://raw.githubusercontent.com/sebbengon/CotC/master/src/assets/icons/${c.id}.png"
  alt="${c.name}"
  class="character-icon"
/>

<div class="character-name name-${c.team}">
  ${c.name}

  <div class="character-ability">
    ${key === "firstNight"
      ? c.firstNightReminder
      : c.otherNightReminder}
  </div>
</div>
    `;

    grid.appendChild(el);
  }

  section.appendChild(grid);
  return section;
}
</script>

</body>
</html>
